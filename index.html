<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typo Terminator</title>
    
   
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' https://pyscript.net 'unsafe-inline' 'unsafe-eval';">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2026.1.1/core.js"></script>
    
    <py-config>
        packages = ["jellyfish", "numpy"]

        [[fetch]]
        files = ["wordbank/600vocabWords.txt"]
    </py-config>    
</head>
<body>
    <nav>
        <ul>
            <li><a href="about.html">about</a></li>
            <li><a href="https://github.com/loganrsilvers/typo-terminator" target="_blank">github repo</a></li>
        </ul>
    </nav>

    <div class="container">
     
        <div style="display: flex; justify-content: center; gap: 20px; align-items: center; margin-bottom: 20px;">
            <select id="DifficultySelect" style="padding: 10px; font-size: 1.2rem; border-radius: 5px; background: #222; color: white; border: 2px solid white;">
                <option value="easy">Easy (15s)</option>
                <option value="medium" selected>Medium (8s)</option>
                <option value="hard">Hard (4s)</option>
                <option value="terminator">Terminator (2s)</option>
            </select>
            <h2 id="TimerDisplay" style="color: #ff4757; margin: 0; font-size: 2rem;">Time: 8s</h2>
        </div>

       
        <h1 id="WordDisplay">history</h1>
        

        <input type="text" id="UserTypingBox" placeholder="Type the correct word and press Enter..." 
               style="font-size: 1.5rem; padding: 10px; margin: 20px 0; border-radius: 8px; border: 2px solid white; background: transparent; color: white; text-align: center; width: 80%;">
        
        <div id="Feedback" style="font-weight: bold; margin-bottom: 10px; min-height: 1.2em;"></div>
        

        <button id="btn">Skip Word</button>
    </div>


    <script type="py" src="python/randomwordDisplay.py" config="py-config"></script>
</body>
</html>
