<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typo Terminator</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <py-config>
        packages = ["jellyfish", "numpy"]
        [[fetch]]
        from = "python"
        files = ["phoneticTypo.py", "randomwordDisplay.py"]

        [[fetch]]
        files = ["wordbank/600vocabWords.txt"]
    </py-config>
</head>
<body>
    <div class="container">
        <h2>TYPO TERMINATOR</h2>

        <!-- ── Game Area ── -->
        <div id="GameArea">
            <!-- HUD -->
            <div class="hud">
                <div><span>Score </span><strong id="ScoreDisplay">0</strong></div>
                <div><span>Streak </span><strong id="StreakDisplay">0</strong></div>
                <div><span>Best </span><strong id="BestDisplay">0</strong></div>
            </div>

            <!-- Lives -->
            <div id="LivesDisplay">❤️ ❤️ ❤️</div>

            <!-- Difficulty + Timer -->
            <div class="top-bar">
                <select id="DifficultySelect">
                    <option value="easy">Easy (15s)</option>
                    <option value="medium" selected>Medium (8s)</option>
                    <option value="hard">Hard (4s)</option>
                    <option value="terminator">Terminator (2s)</option>
                </select>
                <div id="TimerDisplay">Time: --</div>
            </div>

            <!-- Timer bar -->
            <div id="TimerBar"><div id="TimerBarFill"></div></div>

            <!-- Word to correct -->
            <h1 id="WordDisplay">---</h1>

            <!-- Input -->
            <input type="text" id="UserTypingBox"
                   placeholder="Click Start to Begin..." disabled>

            <!-- Feedback -->
            <div id="Feedback"></div>

            <!-- Buttons -->
            <div style="margin-top: 20px;">
                <button id="StartBtn" class="btn btn-green">Start Game</button>
                <button id="SkipBtn"  class="btn btn-red" style="display:none;">Skip Word</button>
            </div>
        </div>

        <!-- ── Game Over Screen ── -->
        <div id="GameOverScreen">
            <h2>GAME OVER</h2>
            <div id="FinalStats">
                <div>Final Score: <strong id="FinalScore">0</strong></div>
                <div>Best Streak: <strong id="FinalStreak">0</strong></div>
            </div>
            <button id="RestartBtn" class="btn btn-green">Play Again</button>
        </div>
    </div>

    <script type="py" src="python/randomwordDisplay.py"></script>
</body>
</html>
