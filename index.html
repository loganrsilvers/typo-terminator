<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typo Terminator</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2026.1.1/core.js"></script>
    
    <py-config>
        # Core packages for your TypoGenerator logic
        packages = ["jellyfish", "numpy"]

        [[fetch]]
        # Fetching the wordbank so it's available in the virtual filesystem
        files = ["wordbank/600vocabWords.txt"]
    </py-config>    
</head>
<body>
    <nav>
        <ul>
            <li><a href="about.html">about</a></li>
            <li><a href="https://github.com/loganrsilvers/typo-terminator" target="_blank">github repo</a></li>
        </ul>
    </nav>

    <div class="container">
        <!-- Displays the scrambled typo -->
        <h1 id="WordDisplay">history</h1>
        
        <!-- Standard Input Box: Reliable typing that doesn't "break" -->
        <input type="text" id="UserTypingBox" placeholder="Type the correct word..." 
               style="font-size: 1.5rem; padding: 10px; margin: 20px 0; border-radius: 8px; border: 2px solid var(--med); background: transparent; color: white; text-align: center; width: 80%;">
        
        <!-- Feedback area for success messages -->
        <div id="Feedback" style="font-weight: bold; margin-bottom: 10px; min-height: 1.2em;"></div>
        
        <button id="btn">Next Word</button>
    </div>

    <!-- The single Python file containing all your logic -->
    <script type="py" src="python/randomwordDisplay.py" config="py-config"></script>
</body>
</html>
