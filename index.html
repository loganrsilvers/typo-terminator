<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typo Terminator</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2026.1.1/core.js"></script>
    
    <py-config>
        # Ensure jellyfish and numpy are available for the merged logic
        packages = ["jellyfish", "numpy"]

        [[fetch]]
        # We only need to fetch the word bank now since all logic is in one file
        files = ["wordbank/600vocabWords.txt"]
    </py-config>    
</head>
<body>
    <nav>
        <ul>
            <li><a href="about.html">about</a></li>
            <li><a href="https://github.com/loganrsilvers/typo-terminator" target="_blank">github repo</a></li>
        </ul>
    </nav>

    <div class="container">
        <!-- The challenge word display -->
        <h1 id="WordDisplay">history</h1>
        
        <!-- Live typing container - Matches the ID used in your merged Python script -->
        <div id="LiveTypeDisplay" style="min-height: 1.5em; font-size: 2rem; font-weight: bold; margin: 20px 0;"></div>
        
        <button id="btn">Click Me!</button>
    </div>

    <!-- 
      This script now contains the TypoGenerator class, the keyboard listener, 
      and the button logic all in one place.
    -->
    <script type="py" src="python/randomwordDisplay.py" config="py-config"></script>
</body>
</html>
