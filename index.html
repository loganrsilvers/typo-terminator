<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typo Terminator</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <py-config id="main-config">
        packages = ["jellyfish", "numpy"]
        [[fetch]]
        files = ["python/randomwordDisplay.py", "python/phoneticTypo.py", "wordbank/600vocabWords.txt"]
    </py-config>

    <style>
        body { background: #1a1a1a; color: white; font-family: Arial, sans-serif; }
        .container { max-width: 800px; margin: 50px auto; text-align: center; }
        h1 { font-size: 3rem; letter-spacing: 3px; }
        button { padding: 10px 20px; font-size: 1rem; cursor: pointer; border: none; border-radius: 5px; margin: 5px; }
        #StartBtn { background-color: #2ecc71; color: white; }
        #SkipBtn { background-color: #e74c3c; color: white; }
        input { width: 80%; padding: 15px; font-size: 1.5rem; background: transparent; color: white; border: 2px solid white; border-radius: 5px; text-align: center; }
        select { padding: 10px; font-size: 1.2rem; background: #222; color: white; border: 2px solid white; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>TYPO TERMINATOR</h2>
        
        <div style="display: flex; justify-content: center; gap: 20px; align-items: center; margin: 20px 0;">
            <select id="DifficultySelect">
                <option value="easy">Easy (15s)</option>
                <option value="medium" selected>Medium (8s)</option>
                <option value="hard">Hard (4s)</option>
                <option value="terminator">Terminator (2s)</option>
            </select>
            <h2 id="TimerDisplay" style="color: #ff4757; margin: 0;">Time: --</h2>
        </div>
    
        <h1 id="WordDisplay">---</h1>
        
        <input type="text" id="UserTypingBox" placeholder="Click Start to Begin..." disabled>
        
        <div style="margin-top: 20px;">
            <button id="StartBtn">Start Game</button>
            <button id="SkipBtn" style="display: none;">Skip Word</button>
        </div>
    </div>

    <script type="py" src="python/randomwordDisplay.py" config="#main-config"></script>
</body>
</html>
