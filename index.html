<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typo Terminator</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2026.1.1/core.js"></script>
    
    <py-config>
        # Ensure jellyfish and numpy are available for phoneticTypo.py
        packages = ["jellyfish", "numpy"]

        [[fetch]]
        # We fetch the wordbank and the logic file so 'import phoneticTypo' works
        files = ["wordbank/600vocabWords.txt", "python/phoneticTypo.py"]
    </py-config>    
</head>
<body>
    <nav>
        <ul>
            <li><a href="about.html">about</a></li>
            <li><a href="https://github.com/loganrsilvers/typo-terminator" target="_blank">github repo</a></li>
        </ul>
    </nav>

    <div class="container">
        <!-- The challenge word from your TypoGenerator class -->
        <h1 id="WordDisplay">history</h1>
        
        <!-- Live typing container -->
        <div id="LiveTypeDisplay" style="min-height: 1.5em; font-size: 2rem; font-weight: bold; margin: 20px 0;"></div>
        
        <button id="btn">Click Me!</button>
    </div>

    <!-- 
      Using 'src' for the main display logic. 
      The browser will now look for 'randomwordDisplay.py' in your python folder.
    -->
    <script type="py" src="python/randomwordDisplay.py" config="py-config"></script>
</body>
</html>
